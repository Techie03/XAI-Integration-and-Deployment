<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Deployment</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js"></script>
</head>
<body>
    <h1>Model Deployment</h1>
    <p>Deploy your machine learning model easily.</p>
    
    <!-- Your existing content -->
    
    <!-- PDF Viewer Section -->
    <div id="pdf-viewer">
        <canvas id="pdf-canvas"></canvas>
        <div>
            <button id="prev" onclick="previousPage()">Previous</button>
            <button id="next" onclick="nextPage()">Next</button>
            <span>Page: <span id="page-num"></span> of <span id="num-pages"></span></span>
        </div>
    </div>

    <script>
        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumIsPending = null;

        const pdfCanvas = document.getElementById('pdf-canvas');
        const ctx = pdfCanvas.getContext('2d');

        function renderPage(num) {
            pageIsRendering = true;
            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: 1 });
                pdfCanvas.height = viewport.height;
                pdfCanvas.width = viewport.width;

                const renderCtx = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                page.render(renderCtx).promise.then(() => {
                    pageIsRendering = false;
                    if (pageNumIsPending !== null) {
                        renderPage(pageNumIsPending);
                        pageNumIsPending = null;
                    }
                });
            });

            document.getElementById('page-num').textContent = num;
        }

        function queueRenderPage(num) {
            if (pageIsRendering) {
                pageNumIsPending = num;
            } else {
                renderPage(num);
            }
        }

        function nextPage() {
            if (pageNum < pdfDoc.numPages) {
                pageNum++;
                queueRenderPage(pageNum);
            }
        }

        function previousPage() {
            if (pageNum > 1) {
                pageNum--;
                queueRenderPage(pageNum);
            }
        }

        // Loading the PDF document
        pdfjsLib.getDocument('path/to/your/document.pdf').promise.then(pdfDoc_ => {
            pdfDoc = pdfDoc_;
            document.getElementById('num-pages').textContent = pdfDoc.numPages;
            renderPage(pageNum);
        });
    </script>
    
    <!-- Footer Section -->
    <footer>
        <p>Footer Content</p>
    </footer>
</body>
</html>
